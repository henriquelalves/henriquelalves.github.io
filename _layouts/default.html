<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }}{% else %}{{ site.name }}{% endif %}</title>
  <link rel="stylesheet" href="//fonts.googleapis.com/css?family=Source+Sans+Pro:300,300i,600">
  <link rel="stylesheet" href="{{ site.baseurl }}/style.css">
  <link rel="alternate" type="application/rss+xml" title="RSS Feed for {{ site.name }}" href="{{ site.baseurl }}/feed.xml" />
  {% seo %}
</head>
<body>
  <div class="container">
    {{ content }}
  </div>
  {% if jekyll.environment == 'production' %}
  {% include analytics.html %}
  {% endif %}
</body>

<div class="footer">
      <p class="text" id="quote"> </p>
</div>

<script>
    var request = new XMLHttpRequest();
    request.onload = function() {
      // get the file contents
      var fileContent = this.responseText;
      // split into lines
      var fileContentLines = fileContent.split( '\n' );
      // get a random index (line number)
      var randomLineIndex = Math.floor( Math.random() * fileContentLines.length );
      // extract the value
      var randomLine = fileContentLines[ randomLineIndex ];

      // add the random line in a div
      document.getElementById( 'quote' ).innerHTML = randomLine;
    };
    request.open( 'GET', 'https://gist.githubusercontent.com/henriquelalves/4adf6d3ff0a04825ab30/raw', true );
    request.send();
</script>

</html>
