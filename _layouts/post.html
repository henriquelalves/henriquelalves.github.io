---
layout: default
---
<header class="masthead">
  <h1 class="masthead-title--small">
    <a href="/blog/">&#8630; blog</a>
  </h1>
</header>
<div class="content post">
  <h1 class="post-title">{{ page.title }}</h1>
  <div class="post-date">
    <time>{{ page.date | date_to_string }}</time><br>
    by {{ page.author }}
  </div>
  <p class="lead">{{ page.lead }}</p>
  {{ content }}
</div>
