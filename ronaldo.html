<html>

<head>
  <title>Active</title>
  <script type="text/javascript" src="/aframe.min.js"></script>
  <script type="text/javascript" src="/socket.io.slim.js"></script>

  <script src="https://unpkg.com/aframe-look-at-component@0.5.1/dist/aframe-look-at-component.min.js"></script>
</head>

<body>
  <script>
    // Setting up socket
    // var socket = window.io('localhost:3000', { query: "player_type=active" });
    var socket = window.io('https://livregamejam2018.herokuapp.com/', { query: "player_type=active" });

    socket.on('connect', (socket) => {
      console.log("Connected!");
    })

    // Game state variables
    var game_started = false;
    var final_rush = false;

    // Final rush
    socket.on('final_rush', () => {
      final_rush = true;
    })

    // Score update
    socket.on('update_score', (score) => {
      document.querySelector("#score").innerHTML = "Score: " + score;
    })

    // Timer update
    socket.on('update_timer', (timer) => {
      console.log(timer);
      document.querySelector("#timer").setAttribute('value', timer);
    })

    // Game ended
    socket.on('game_ended', () => {
      document.querySelector("#timer").setAttribute('value', 'You lost because the jury\nwas unfair');
      document.querySelector("#label").setAttribute('value', '');
    })

    // Camera listener to constantly send camera position to server
    AFRAME.registerComponent('camera-listener', {
      update: function () {
        // this.el.cameraEl = document.querySelector('#camera');
      },

      tick: function (time, timeDelta) {
        var rot = this.el.getAttribute('rotation');
        socket.emit('update_camera', rot);
      }
    })

    // Label listener (updates label on server demand)
    AFRAME.registerComponent('label-listener', {
      update: function () {
        socket.on('update_label', (letter, pos) => {
          this.el.setAttribute('value', letter);
          this.el.setAttribute('position', pos);
        })
      },
      
      tick: function (time, timeDelta) {
        if (final_rush) {
          this.el.setAttribute('width', 10 + Math.sin(time*0.01));
        }
      }
    })

    // Lock to camera rotation component
    AFRAME.registerComponent('lock-camera-rot', {
      tick: function () {
        var roty = document.querySelector("#player_camera").getAttribute('rotation').y;
        var this_rot = this.el.getAttribute("rotation");
        this_rot.y = roty;
        this.el.setAttribute("rotation", this_rot);
      }
    })

  </script>

  <a-scene background="color: white">

    <!-- Assets -->
    <a-assets>
      <!-- Court -->
      <a-asset-item id="Court-obj" src="Court_T.obj"></a-asset-item>
      <a-asset-item id="Court-mtl" src="Court_T.mtl"></a-asset-item>

      <!-- Legs -->
      <img id="legs" src="legs.png">

      <!-- Judge -->
      <img id="judge" src="judge.png">
      
      <!-- Jury -->
      <img id="jury1" src="jury1.png">
      <img id="jury2" src="jury2.png">
      <img id="jury3" src="jury3.png">
      <img id="jury4" src="jury4.png">
      <img id="jury5" src="jury5.png">
      <img id="jury6" src="jury6.png">
      <img id="jury7" src="jury7.png">
      <img id="jury8" src="jury8.png">
      <img id="jury9" src="jury9.png">
      
      <!-- Lawyers -->
      <img id="wright" src="wright2.png">
      <img id="godot" src="godot2.png">
      
    </a-assets>

    <!-- Court (centered around the player)-->
    <a-obj-model src="#Court-obj" mtl="#Court-mtl" scale="0.3 0.3 0.3"></a-obj-model>

    <!-- Legs (just beneath the player) -->
    <a-entity id="#legs_pivot" position="0 0 0" lock-camera-rot>
      <a-image src="#legs" rotation="90 0 180" width="1" height="1" position="0 1 0.3"></a-image>
    </a-entity>

    <!-- Judge Image -->
    <a-image src="#judge" rotation="0 0 0" width="5" height="5" position="0 6.5 -10"></a-image>

	<!-- Jury -->
	<a-image src="#jury8" width="2" height="2" position="-8.1 5.0 7.0" look-at="#player_pivot"></a-image>
    <a-image src="#jury1" width="2" height="2" position="-8.1 5.0 -3.0" look-at="#player_pivot"></a-image>
    <a-image src="#jury2" width="2" height="2" position="-8.1 5.0 -1.0" look-at="#player_pivot"></a-image>
    <a-image src="#jury3" width="2" height="2" position="-8.1 5.0 1.0" look-at="#player_pivot"></a-image>
    <a-image src="#jury7" width="2" height="2" position="-8.1 5.0 3.0" look-at="#player_pivot"></a-image>
    <a-image src="#jury5" width="2" height="2" position="-8.1 5.0 5.0" look-at="#player_pivot"></a-image>
    
    
    <a-image src="#jury9" width="2" height="2" position="8.1 5.0 -3.0" look-at="#player_pivot"></a-image>
    <a-image src="#jury3" width="2" height="2" position="8.1 5.0 -1.0" look-at="#player_pivot"></a-image>
    <a-image src="#jury8" width="2" height="2" position="8.1 5.0 1.0" look-at="#player_pivot"></a-image>
    <a-image src="#jury4" width="2" height="2" position="8.1 5.0 3.0" look-at="#player_pivot"></a-image>
    <a-image src="#jury5" width="2" height="2" position="8.1 5.0 5.0" look-at="#player_pivot"></a-image>
    <a-image src="#jury6" width="2" height="2" position="8.1 5.0 7.0" look-at="#player_pivot"></a-image>

	<!-- Lawyers -->
    <a-image src="#wright" rotation="0 270 0" width="3" height="3" position="-5.0 1.8 0.0" ></a-image>
    <a-image src="#godot" rotation="0 270 0" width="3.1" height="3.1" position="5.0 1.8 1.0" ></a-image>
    <!-- Label -->
    <a-text id="label" font='custom-msdf.json' value="DIGA JOGO PARA COMEÇAR" color="black" label-listener look-at="#player_pivot"
      position="2 4 10"></a-text>

    <!-- Player -->
    <a-entity id="player_pivot" position="0 0 0">
      <a-camera id="player_camera" camera-listener look-controls-enabled="true" wasd-controls-enabled="false">
      </a-camera>
    </a-entity>

    <!-- Floor -->
    <a-plane color="tomato" height="100" width="100" rotation="-90 0 0"></a-plane>

    <!-- Timer -->
    <a-text id="timer" value="60" width="50" align="center" color="black" look-at="#player_pivot" position="0 9 -9"></a-text>

  </a-scene>

  <div id="score" style="font-family: 'Courier New'; font-size: 40px; position: fixed; top:0; left:0">
    Score: 0
  </div>
</body>

</html>
