<html>

<head>
  <title>Dummy</title>
  <script type="text/javascript" src="/aframe.min.js"></script>
  <script type="text/javascript" src="/socket.io.slim.js"></script>
  <script type="text/javascript" src="/artyom.window.min.js"></script>

  <script src="https://unpkg.com/aframe-look-at-component@0.5.1/dist/aframe-look-at-component.min.js"></script>

</head>

<body>
  <script>
    // Voice recognition!
    const artyom = new Artyom();

    // Commands
    artyom.addCommands({
      indexes: ['start game'],
      action: function (i) {
        if (i === 0) {
          socket.emit("start_game");
        }
      }
    });

    artyom.redirectRecognizedTextOutput((recognized, isFinal) => {
      document.querySelector("#speech").innerHTML = recognized;
      if (recognized.toUpperCase() === document.querySelector("#label").getAttribute('value')) {
        socket.emit('correct_input');
      }
    });

    artyom.initialize({
      lang: "en-US",
      debug: true,
      continuous: true,
      listen: true
    });

    setInterval(function () {
      artyom.restart();
    }, 5000);

    // Setting up socket
    // var socket = window.io('localhost:3000', { query: "player_type=active" });
    var socket = window.io('https://livregamejam2018.herokuapp.com/', { query: "player_type=dummy" });

    socket.on('connect', (socket) => {
      console.log("Connected!");
    })

    // Game state variables
    var game_started = false;

    // Score update
    socket.on('update_score', (score) => {
      document.querySelector("#score").innerHTML = "Score: " + score;
    })

    // Timer update
    socket.on('update_timer', (timer) => {
      console.log(timer);
      document.querySelector("#timer").setAttribute('value', timer);
    })

    // Game ended
    socket.on('game_ended', () => {
      document.querySelector("#timer").setAttribute('value', 'You lost because the jury\nwas unfair');
      document.querySelector("#label").setAttribute('value', '');

    })

    // Camera listener to get camera rotation from the socket
    AFRAME.registerComponent('camera-listener', {
      update: function () {
        socket.on('on_update_camera', (rot) => {
          this.el.setAttribute('rotation', rot);
        })
      }
    });

    // Label listener (updates label on server demand)
    AFRAME.registerComponent('label-listener', {
      update: function () {
        socket.on('update_label', (letter, pos) => {
          this.el.setAttribute('value', letter);
          this.el.setAttribute('position', pos);
        })
      }
    })
  </script>

  <a-scene keyboard-shortcuts="enterVR: false" background="color: white">

    <!-- Label -->
    <a-text id="label" value="Say 'start game' to play" color="black" label-listener look-at="#player_pivot" position="2 2 10"></a-text>

    <!-- Player -->
    <a-entity id="player_pivot" position="0 0 0">
      <a-camera camera-listener look-controls-enabled="false" wasd-controls-enabled="false">
      </a-camera>
    </a-entity>

    <!-- Floor -->
    <a-plane color="tomato" height="100" width="100" rotation="-90 0 0"></a-plane>

    <!-- Timer -->
    <a-text id="timer" value="60" width="50" align="center" color="black" look-at="#player_pivot" position="0 5 -10"></a-text>

  </a-scene>

  <div id="score" style="font-family: 'Courier New'; font-size: 40px; position: fixed; top:0; left:0">
    Score: 0
  </div>

  <div id="speech" style="font-family: 'Courier New'; font-size: 40px; position: fixed; bottom:0; left:0">

  </div>

</body>

</html>
